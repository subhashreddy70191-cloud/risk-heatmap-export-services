<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Risk Summary</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; margin: 0; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; padding: 24px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .header { background-color: #1B4F8A; color: #fff; padding: 16px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 24px; text-align: center; }
        .stat-box { display: inline-block; width: 40%; padding: 16px; margin: 8px; border-radius: 8px; color: #fff; }
        .active-risks { background-color: #3498db; }
        .high-risks { background-color: #e74c3c; }
        .number { font-size: 2em; font-weight: bold; display: block; margin-bottom: 8px; }
        .action-button { display: inline-block; background-color: #1B4F8A; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 8px; min-height: 44px; min-width: 44px; line-height: 20px; font-weight: bold; margin-top: 16px; box-sizing: border-box; }
        .footer { text-align: center; margin-top: 24px; font-size: 0.8em; color: #7f8c8d; padding: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Risk Heatmap Daily Summary</h2>
    </div>
    <div class="content">
        <p>Good morning!</p>
        <p>Here is your daily overview of the system's risk items:</p>
        
        <div>
            <div class="stat-box active-risks">
                <span class="number" th:text="${activeCount}">0</span>
                <span>Total Active Risks</span>
            </div>
            <div class="stat-box high-risks">
                <span class="number" th:text="${highRiskCount}">0</span>
                <span>High Severity Risks</span>
            </div>
        </div>
        
        <p>Please log in to the dashboard to review and mitigate high-severity risks.</p>
        <a href="#" class="action-button">Log In to Dashboard</a>
    </div>
    <div class="footer">
        <p>Risk Heatmap Export Service &copy; 2024</p>
    </div>
</div>
</body>
</html>
