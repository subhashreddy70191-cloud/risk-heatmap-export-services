<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Risk Summary</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .header { background-color: #2c3e50; color: #fff; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; text-align: center; }
        .stat-box { display: inline-block; width: 45%; padding: 15px; margin: 10px; border-radius: 5px; color: #fff; }
        .active-risks { background-color: #3498db; }
        .high-risks { background-color: #e74c3c; }
        .number { font-size: 2em; font-weight: bold; display: block; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.8em; color: #7f8c8d; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Risk Heatmap Daily Summary</h2>
    </div>
    <div class="content">
        <p>Good morning!</p>
        <p>Here is your daily overview of the system's risk items:</p>
        
        <div>
            <div class="stat-box active-risks">
                <span class="number" th:text="${activeCount}">0</span>
                <span>Total Active Risks</span>
            </div>
            <div class="stat-box high-risks">
                <span class="number" th:text="${highRiskCount}">0</span>
                <span>High Severity Risks</span>
            </div>
        </div>
        
        <p>Please log in to the dashboard to review and mitigate high-severity risks.</p>
    </div>
    <div class="footer">
        <p>Risk Heatmap Export Service &copy; 2024</p>
    </div>
</div>
</body>
</html>
