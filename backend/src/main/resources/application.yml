server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: risk-heatmap-export-service

  datasource:
    url: jdbc:h2:mem:riskmap;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms

  cache:
    type: none

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: testpass
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: RiskHeatmap2024SecureKeyMinimum32CharsLong!!
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

ai-service:
  base-url: http://localhost:5000

app:
  admin-email: admin@riskmap.internal
  frontend-url: http://localhost

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    packages-to-scan: com.riskheatmap 

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.riskheatmap: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN