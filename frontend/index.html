<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskHeatmap | Premium Enterprise Risk Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div id="app">
        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay" style="display: none;">
            <div class="card modal-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2>Add New Risk</h2>
                    <button class="btn" onclick="actions.toggleModal(false)" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer;"><i data-lucide="x"></i></button>
                </div>
                <form onsubmit="actions.addRisk(event)">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted);">Risk Title</label>
                        <input name="title" type="text" required placeholder="e.g. Server Latency Issues" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted);">Likelihood (1-5)</label>
                            <input name="likelihood" type="number" min="1" max="5" required value="1" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted);">Impact (1-5)</label>
                            <input name="impact" type="number" min="1" max="5" required value="1" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted);">Category</label>
                        <select name="category" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
                            <option value="TECHNICAL">TECHNICAL</option>
                            <option value="OPERATIONAL">OPERATIONAL</option>
                            <option value="COMPLIANCE">COMPLIANCE</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create Risk Entry</button>
                </form>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="navbar" id="navbar" style="display: none;">
            <div class="logo">
                <i data-lucide="shield-alert"></i>
                RiskHeatmap
            </div>
            <div class="nav-links">
                <a onclick="router.navigate('dashboard')" id="nav-dashboard">Dashboard</a>
                <a onclick="router.navigate('inventory')" id="nav-inventory">Inventory</a>
                <a onclick="router.navigate('analysis')" id="nav-analysis">AI Analysis</a>
                <a onclick="router.navigate('export')" id="nav-export">Export</a>
            </div>
            <div class="user-profile">
                <span id="user-name">Subhash Reddy</span>
                <button class="btn btn-primary" onclick="auth.logout()" style="margin-left: 15px; padding: 6px 12px; font-size: 14px;">Logout</button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content" id="main-content">
            <!-- Content will be injected here by app.js -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
