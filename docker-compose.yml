version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: risk_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: riskmap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - risk_network

  cache:
    image: redis:7-alpine
    container_name: risk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - risk_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: risk_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/riskmap
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_DATA_REDIS_HOST=cache
      - SPRING_DATA_REDIS_PORT=6379
      - AI_SERVICE_URL=http://python-ai:5000
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - risk_network

  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: risk_python_ai
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    networks:
      - risk_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: risk_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - risk_network

volumes:
  postgres_data:
  redis_data:

networks:
  risk_network:
    driver: bridge
